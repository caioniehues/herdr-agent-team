id = "caioniehues.herdmates"
name = "Herdmates"
version = "2.1.0"
min_herdr_version = "0.7.4"
description = "Claude Code teammates, native in herdr — teammux shim, agent board, focus pane (pivot in progress, ADR-0012; legacy team orchestration still included)"
platforms = ["linux", "macos"]

[[build]]
# Issue #101: `cargo install` builds release itself, so this one hook
# both builds and puts a bare-argv0-resolvable `herdmates` on PATH at
# `~/.local/bin` (confirmed on PATH, matches where `herdr` itself
# lives). herdr spawns argv directly (no shell) — a literal "~" in
# argv would never expand and would create a literal ./~ directory, so
# this goes through the manifest's existing `sh -c` convention
# (`open-board` action already does), not a bare argv array.
command = ["sh", "-c", "cargo install --path . --root \"$HOME/.local\""]

[[actions]]
id = "spawn"
title = "Spawn agent team"
contexts = ["workspace"]
command = ["herdmates", "spawn"]

[[actions]]
id = "status"
title = "Team status"
contexts = ["workspace"]
command = ["herdmates", "status"]

[[actions]]
id = "kill"
title = "Kill team"
contexts = ["workspace"]
command = ["herdmates", "kill"]

[[actions]]
id = "open-board"
title = "Open team control deck"
contexts = ["workspace"]
command = ["sh", "-c", "\"$HERDR_BIN_PATH\" plugin pane open --plugin caioniehues.herdmates --entrypoint board --placement tab"]

[[actions]]
id = "open-report"
title = "Open team report"
contexts = ["pane"]
command = ["herdmates", "open-report"]

[[actions]]
id = "jump"
title = "Jump to next attention item"
contexts = ["workspace"]
command = ["herdmates", "jump"]

[[panes]]
id = "board"
title = "Agent Team control deck"
description = "Keyboard-driven worker controls; open as a tab or override placement for a quick popup."
placement = "tab"
command = ["herdmates", "board"]

[[panes]]
id = "focus"
title = "Focus"
description = "One-next-action focus file + decision queue. A real split/overlay pane — never a popup."
placement = "split"
command = ["herdmates", "focus"]

[[actions]]
id = "open-focus"
title = "Open focus pane"
contexts = ["workspace"]
command = ["sh", "-c", "\"$HERDR_BIN_PATH\" plugin pane open --plugin caioniehues.herdmates --entrypoint focus --placement split"]

# Issue #98 stage 3 (ADR-0013 §93 stage 3, docs/spec.md §4): read-only
# full-screen board, split placement per Caio decision — distinct from the
# legacy `board` entrypoint above (frozen v1.1.0, different data model).
[[panes]]
id = "pane-board"
title = "Mission control board"
description = "Read-only team overview: agent status/reason badges, task list, mailbox tail. All reads, no writes."
placement = "split"
command = ["herdmates", "pane-board"]

[[actions]]
id = "open-pane-board"
title = "Open mission control board"
contexts = ["workspace"]
command = ["sh", "-c", "\"$HERDR_BIN_PATH\" plugin pane open --plugin caioniehues.herdmates --entrypoint pane-board --placement split"]

[[link_handlers]]
id = "report"
title = "Open team report"
pattern = "^report:.+$"
action = "open-report"

# Report flow: worker status flips -> inbox append + pointer injection into the
# god pane (ADR-0002). The manifest uses the live-verified dot-form event name;
# HERDR_PLUGIN_EVENT_JSON uses the underscore form (spec section 9).
[[events]]
on = "pane.agent_status_changed"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "pane.moved"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "pane.exited"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "pane.closed"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "workspace.closed"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "worktree.removed"
command = ["herdmates", "on-agent-status"]

[[events]]
on = "pane.agent_detected"
command = ["herdmates", "on-agent-status"]
