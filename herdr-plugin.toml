id = "caioniehues.herdmates"
name = "Herdmates"
version = "2.0.0"
min_herdr_version = "0.7.4"
description = "Claude Code teammates, native in herdr — teammux shim, agent board, focus pane (pivot in progress, ADR-0012; legacy team orchestration still included)"
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "spawn"
title = "Spawn agent team"
contexts = ["workspace"]
command = ["target/release/herdmates", "spawn"]

[[actions]]
id = "status"
title = "Team status"
contexts = ["workspace"]
command = ["target/release/herdmates", "status"]

[[actions]]
id = "kill"
title = "Kill team"
contexts = ["workspace"]
command = ["target/release/herdmates", "kill"]

[[actions]]
id = "open-board"
title = "Open team control deck"
contexts = ["workspace"]
command = ["sh", "-c", "\"$HERDR_BIN_PATH\" plugin pane open --plugin caioniehues.herdmates --entrypoint board --placement tab"]

[[actions]]
id = "open-report"
title = "Open team report"
contexts = ["pane"]
command = ["target/release/herdmates", "open-report"]

[[actions]]
id = "jump"
title = "Jump to next attention item"
contexts = ["workspace"]
command = ["target/release/herdmates", "jump"]

[[panes]]
id = "board"
title = "Agent Team control deck"
description = "Keyboard-driven worker controls; open as a tab or override placement for a quick popup."
placement = "tab"
command = ["target/release/herdmates", "board"]

[[link_handlers]]
id = "report"
title = "Open team report"
pattern = "^report:.+$"
action = "open-report"

# Report flow: worker status flips -> inbox append + pointer injection into the
# god pane (ADR-0002). The manifest uses the live-verified dot-form event name;
# HERDR_PLUGIN_EVENT_JSON uses the underscore form (spec section 9).
[[events]]
on = "pane.agent_status_changed"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "pane.moved"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "pane.exited"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "pane.closed"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "workspace.closed"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "worktree.removed"
command = ["target/release/herdmates", "on-agent-status"]

[[events]]
on = "pane.agent_detected"
command = ["target/release/herdmates", "on-agent-status"]
